workflows:
  android-test-apk:
    name: SE7EN FIT Standalone Test APK
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      vars:
        EXPO_NO_TELEMETRY: "1"
        YARN_CACHE_FOLDER: "$CM_BUILD_DIR/.yarn-cache"
        COREPACK_ENABLE_PROJECT_SPEC: "0"
    scripts:
      - name: Install dependencies with Yarn Classic
        script: |
          cd expo
          node --version
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          corepack yarn@1.22.22 --version
          rm -rf node_modules package-lock.json yarn.lock .yarn .pnp.*
          corepack yarn@1.22.22 install --ignore-engines --network-timeout 600000 --non-interactive
      - name: Generate clean Android project
        script: |
          cd expo
          CI=1 ./node_modules/.bin/expo prebuild --platform android --no-install --clean
      - name: Force ARM64 Android ABI
        script: |
          cd expo
          if [ -f android/gradle.properties ]; then
            sed -i.bak "s/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/" android/gradle.properties || true
            grep -q '^reactNativeArchitectures=' android/gradle.properties || echo 'reactNativeArchitectures=arm64-v8a' >> android/gradle.properties
          fi
      - name: Build standalone APK
        script: |
          cd expo/android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a --stacktrace
    artifacts:
      - expo/android/app/build/outputs/apk/release/*.apk
      - expo/android/app/build/outputs/**/mapping.txt
